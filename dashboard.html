<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>路径规划 — Karmora</title>
    <style>
        /* ===== BETA BANNER ===== */
        .beta-banner {
            background: linear-gradient(135deg, #FFF0EB 0%, #FFE4D6 100%);
            border-bottom: 1px solid #FFD6C2;
            padding: 12px 24px;
            text-align: center;
            font-size: 14px;
            font-weight: 600;
            color: var(--orange-dark);
            position: relative;
            z-index: 99;
            margin-top: 0;
        }
        .beta-banner .badge {
            display: inline-block;
            background: var(--orange);
            color: white;
            padding: 2px 10px;
            border-radius: 9999px;
            font-size: 11px;
            font-weight: 700;
            margin-right: 8px;
            vertical-align: middle;
        }
        .beta-banner .note {
            font-weight: 400;
            color: var(--gray);
            margin-left: 4px;
        }
        .beta-banner .subscribe-btn {
            display: inline-block;
            background: white;
            color: var(--gray);
            border: 1px solid #CCC;
            padding: 4px 16px;
            border-radius: 9999px;
            font-size: 12px;
            font-weight: 600;
            cursor: not-allowed;
            margin-left: 12px;
            opacity: 0.6;
        }
        body { padding-top: 64px; } /* nav height */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --orange: #FF4500; --orange-dark: #E03D00; --dark: #1A1A1B; --gray: #787C7E; --light-gray: #F6F7F8; --white: #FFFFFF; --green: #46D160; --red: #FF585B; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif; color: var(--dark); line-height: 1.6; background: var(--white); }
        nav { position: fixed; top: 0; width: 100%; background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); border-bottom: 1px solid #EDEFF1; z-index: 100; padding: 0 24px; }
        .nav-inner { max-width: 1100px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; height: 64px; }
        .logo { display: flex; align-items: center; gap: 10px; font-size: 22px; font-weight: 800; color: var(--orange); text-decoration: none; }
        .logo-icon { width: 36px; height: 36px; background: var(--orange); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 18px; }
        .nav-links { display: flex; gap: 8px; margin-right: auto; margin-left: 40px; }
        .nav-link { padding: 6px 16px; border-radius: 9999px; font-size: 14px; font-weight: 600; color: var(--gray); text-decoration: none; transition: all 0.2s; border: 1px solid transparent; }
        .nav-link:hover { color: var(--dark); background: var(--light-gray); }
        .nav-link.active { color: var(--orange); background: #FFF0EB; border-color: #FFD6C2; }
        .nav-cta { background: var(--orange); color: white; border: none; padding: 10px 24px; border-radius: 9999px; font-size: 15px; font-weight: 600; cursor: pointer; text-decoration: none; }

        .page { padding: 100px 24px 80px; max-width: 800px; margin: 0 auto; }
        .page-title { font-size: 36px; font-weight: 800; margin-bottom: 8px; }
        .page-sub { font-size: 18px; color: var(--gray); margin-bottom: 40px; }

        .input-group { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
        .input-label { display: block; font-weight: 700; font-size: 13px; margin-bottom: 6px; color: var(--gray); }
        .input-field { width: 100%; padding: 12px 16px; border: 2px solid #EDEFF1; border-radius: 10px; font-size: 15px; outline: none; transition: border-color 0.2s; }
        .input-field:focus { border-color: var(--orange); }
        .generate-btn { width: 100%; padding: 14px; background: var(--orange); color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 700; cursor: pointer; margin-bottom: 32px; }
        .generate-btn:hover { background: var(--orange-dark); }

        .plan { background: var(--light-gray); border-radius: 12px; padding: 24px; }
        .plan-header { margin-bottom: 20px; }
        .plan-phase-name { font-size: 14px; color: var(--orange); font-weight: 700; }
        .plan-meta { font-size: 13px; color: var(--gray); margin-top: 4px; }
        .phase-card { background: white; border-radius: 10px; padding: 20px; margin-bottom: 12px; border-left: 4px solid var(--orange); }
        .phase-name { font-weight: 700; font-size: 15px; margin-bottom: 4px; }
        .phase-goal { font-size: 13px; color: var(--orange); font-weight: 600; margin-bottom: 10px; }
        .phase-tasks { padding-left: 18px; font-size: 13px; color: #555; line-height: 1.8; }
        .phase-tip { font-size: 12px; color: var(--gray); margin-top: 12px; font-style: italic; padding: 10px 14px; background: #FFF8E1; border-radius: 6px; line-height: 1.6; }
        .safety-warning { font-size: 12px; color: #C62828; margin-top: 12px; padding: 10px 14px; background: #FFF0F0; border-radius: 6px; line-height: 1.6; }
        .sub-link { color: var(--orange); text-decoration: none; font-weight: 600; }
        .sub-link:hover { text-decoration: underline; }
        .badge-official { display: inline-block; font-size: 10px; padding: 1px 6px; border-radius: 4px; background: #E8F5E9; color: #2E7D32; font-weight: 600; margin-left: 4px; }

        .empty { text-align: center; color: var(--gray); padding: 60px 20px; font-size: 15px; }
        footer { text-align: center; padding: 40px 24px; color: var(--gray); font-size: 14px; border-top: 1px solid #EDEFF1; }
    </style>
</head>
<body>

<!-- ===== BETA BANNER ===== -->
<div class="beta-banner" id="betaBanner" style="display:none;">
    <span class="badge">Beta</span>
    内测期：所有功能限时免费
    <span class="note">— 内测结束后将转为会员制收费模式</span>
    <span class="subscribe-btn">📋 会员订阅（即将开放）</span>
</div>

<script>
    // 统一 auth 检查：支持两种登录方式
    const karmoraUser = localStorage.getItem('karmora_user');
    const karmoraUnlocked = localStorage.getItem('karmora_unlocked');
    
    if (!karmoraUser && !karmoraUnlocked) {
        window.location.href = 'login.html';
    }
    
    // 如果只有 karmora_unlocked，也设定 karmora_user
    if (!karmoraUser && karmoraUnlocked) {
        localStorage.setItem('karmora_user', JSON.stringify({
            email: 'user@karmora.com',
            status: 'beta',
            loginAt: new Date().toISOString()
        }));
    }
    
    // 显示 Beta Banner
    try {
        const user = JSON.parse(localStorage.getItem('karmora_user') || '{}');
        if (user.status === 'beta') {
            document.getElementById('betaBanner').style.display = 'block';
        }
    } catch(e) {}
</script>

    <div class="nav-inner">
        <a href="index.html" class="logo"><div class="logo-icon">K</div>Karmora</a>
        <div class="nav-links">
            <a href="communities.html" class="nav-link">社区数据库</a>
            <a href="match.html" class="nav-link">智能匹配</a>

<script>
// 显示用户邮箱
try {
    const u = JSON.parse(localStorage.getItem('karmora_user') || '{}');
    if (u.email) document.getElementById('userEmail').textContent = u.email;
} catch(e) {}
function logout() {
    localStorage.removeItem('karmora_user');
    localStorage.removeItem('karmora_unlocked');
    sessionStorage.removeItem('karmora_user');
    window.location.href = '/login.html';
}
</script>

<div class="page">
    <h1 class="page-title">🗺️ 路径规划</h1>
    <p class="page-sub">基于 Reddit 官方指南和真实社区数据，为你生成安全的增长路径</p>

    <!-- 插件同步状态 -->
    <div id="plugin-status" style="background: #FFF3E0; border: 1px solid #FFB74D; border-radius: 10px; padding: 16px; margin-bottom: 20px; display: flex; align-items: center; gap: 12px;">
        <div style="font-size: 24px;">🔌</div>
        <div style="flex:1;">
            <div style="font-weight: 700; font-size: 14px;">插件未连接</div>
            <div style="font-size: 13px; color: var(--gray);">请安装 Karmora Chrome 插件自动同步，或手动输入数据</div>
        </div>
        <a href="#" onclick="showManualInput();return false;" style="background: var(--orange); color: white; padding: 8px 16px; border-radius: 6px; text-decoration: none; font-size: 13px; font-weight: 600;">手动输入</a>
    </div>

    <!-- 手动输入 -->
    <div id="manual-input" style="display:none; background: white; border: 1px solid #EDEFF1; border-radius: 10px; padding: 20px; margin-bottom: 20px;">
        <div style="font-weight:700;font-size:14px;margin-bottom:12px;">📝 手动输入账号数据</div>
        <div class="input-group">
            <div>
                <label class="input-label">当前总 Karma</label>
                <input type="number" id="manual-karma" class="input-field" placeholder="如：25" min="0" value="0">
            </div>
            <div>
                <label class="input-label">账号年龄（天）</label>
                <input type="number" id="manual-age" class="input-field" placeholder="如：30" min="1" value="1">
            </div>
        </div>
        <button onclick="submitManual()" style="margin-top:12px;background:var(--orange);color:white;border:none;padding:10px 24px;border-radius:6px;font-weight:700;font-size:14px;cursor:pointer;">确认生成</button>
    </div>

    <!-- 账号数据（从插件同步） -->
    <div class="input-group" id="account-data" style="display: none;">
        <div>
            <label class="input-label">当前总 Karma</label>
            <div class="input-field" style="background: #F6F7F8; cursor: not-allowed;">
                <span id="sync-karma">--</span>
                <span style="font-size: 11px; color: var(--green); margin-left: 8px;">✓ 已同步</span>
            </div>
        </div>
        <div>
            <label class="input-label">账号年龄</label>
            <div class="input-field" style="background: #F6F7F8; cursor: not-allowed;">
                <span id="sync-age">--</span>
                <span style="font-size: 11px; color: var(--green); margin-left: 8px;">✓ 已同步</span>
            </div>
        </div>

    <button class="generate-btn" id="btn-generate" disabled>🚀 生成路径</button>

    <div id="plan-output">
        <div class="empty">👆 请先连接插件以生成个性化增长路径</div>
    </div>
</div>

<footer>Karmora © 2026 · 帮你安全度过 Reddit 冷启动期</footer>

<script src="js/data.js"></script>
<script>
function generatePlan(karma, ageDays) {
    const output = document.getElementById('plan-output');

    // Phase determination: karma + age
    let phase, phaseName, phaseTime, phaseGoal;
    if (karma < 10 || ageDays < 7) {
        // Age < 7: always Phase 1 regardless of karma
        phase = 1;
        if (ageDays < 7) {
            phaseName = '🌱 第一阶段：建立基础（新号保护期）';
            phaseTime = `${7 - ageDays} 天后可尝试发帖`;
            phaseGoal = 'Comment Karma 达到 10+，账号满 7 天';
        } else {
            phaseName = '🌱 第一阶段：建立基础';
            phaseTime = '1-2 周';
            phaseGoal = 'Comment Karma 达到 10+';
        }
    } else if (karma < 50 || ageDays < 30) {
        phase = 2;
        if (ageDays < 30) {
            phaseName = '🌿 第二阶段：稳步增长';
            phaseTime = `${30 - ageDays} 天后解锁更多社区`;
            phaseGoal = 'Combined Karma 达到 50+，账号满 30 天';
        } else {
            phaseName = '🌿 第二阶段：稳步增长';
            phaseTime = '2-4 周';
            phaseGoal = 'Combined Karma 达到 50+';
        }
    } else {
        phase = 3; phaseName = '🌳 第三阶段：建立影响力'; phaseTime = '持续'; phaseGoal = '在目标社区建立信誉';
    }

    // Filter communities
    let recommended, secondary;
    if (phase === 1) {
        // Best: Reddit verified + excellent badge, lowest zero_rate
        recommended = COMMUNITIES
            .filter(c => c.badge === 'excellent' && c.zero_rate <= 6)
            .sort((a, b) => a.zero_rate - b.zero_rate || b.avg_comments - a.avg_comments);
        secondary = COMMUNITIES
            .filter(c => c.badge === 'good' && c.zero_rate <= 10 && c.avg_comments >= 0.8)
            .sort((a, b) => a.zero_rate - b.zero_rate)
            .slice(0, 5);
    } else if (phase === 2) {
        recommended = COMMUNITIES
            .filter(c => (c.badge === 'excellent' || c.badge === 'good') && c.zero_rate <= 10)
            .sort((a, b) => b.avg_comments - a.avg_comments);
        secondary = COMMUNITIES
            .filter(c => c.badge === 'good' && c.zero_rate > 10 && c.zero_rate <= 20)
            .sort((a, b) => a.zero_rate - b.zero_rate)
            .slice(0, 5);
    } else {
        recommended = COMMUNITIES
            .filter(c => c.badge === 'excellent' || c.badge === 'good')
            .sort((a, b) => b.avg_comments - a.avg_comments);
        secondary = COMMUNITIES
            .filter(c => c.badge === 'warn')
            .sort((a, b) => a.zero_rate - b.zero_rate)
            .slice(0, 5);
    }

    // Build HTML
    let html = `<div class="plan">
        <div class="plan-header">
            <div class="plan-phase-name">${phaseName}</div>
            <div class="plan-meta">预计 ${phaseTime} · 目标：${phaseGoal}</div>
        </div>`;

    // Safety warnings (from Reddit official research)
    html += `<div class="safety-warning">
        ⛔ <strong>红线规则（来自 Reddit 官方）：</strong><br>
        • <strong>不要用 free karma 社区</strong>（如 r/FreeKarma4U、r/Karma4Free）— 这类社区让用户互刷 karma，使用后会被其他社区认为你是 spammer/bot，可能被连坐封禁<br>
        • <strong>不要请求 karma/upvote</strong> — 直接或间接求赞 = 投票操控，违反 Reddit 规则<br>
        • <strong>不要 spam</strong> — 短时间大量发帖/评论、重复发相同内容、发跟社区无关的内容<br>
        • <strong>不要自我推广</strong> — Reddit 传统上对推广零容忍，先建立信誉再自然提及
    </div>`;

    // Action plan
    html += `<div class="phase-card">
        <div class="phase-name">${phase === 1 ? '📋 本周行动' : phase === 2 ? '📋 本月行动' : '📋 持续行动'}</div>
        <div class="phase-goal">🎯 ${phaseGoal}</div>
        <ul class="phase-tasks">`;

    if (phase === 1) {
        html += `<li><strong>只评论，不发帖</strong> — 评论的限制比发帖低得多</li>`;
        if (ageDays < 7) {
            html += `<li>⚠️ 新号保护期（< 7天），发帖大概率被自动移除或进入审核队列</li>`;
        }
        html += `<li>每天评论 1-2 个帖子，质量 > 数量</li>`;
        html += `<li>找你真正感兴趣的帖子，分享真实经验或有帮助的回答</li>`;
        html += `<li>按 "new" 排序，互动最新帖子更容易被看到</li>`;
        html += `<li>先潜水 1-2 天，了解每个社区的文化和规则</li>`;
    } else if (phase === 2) {
        html += `<li>每天评论 2-3 个帖子保持活跃</li>`;
        if (ageDays < 30) {
            html += `<li>可以尝试发帖，但部分社区仍有年龄限制（需满 30 天）</li>`;
        } else {
            html += `<li>可以尝试在目标社区发帖，但先评论 10+ 次了解社区</li>`;
        }
        html += `<li>发帖前检查是否需要 Flair</li>`;
        html += `<li>回复每一条评论，提升帖子互动</li>`;
        html += `<li>验证邮箱可提升 CQS（Contributor Quality Score）</li>`;
    } else {
        html += `<li>保持每天评论的习惯</li>`;
        html += `<li>每周发 2-3 个高质量帖子</li>`;
        html += `<li>90/10 法则：90% 提供价值，10% 推广</li>`;
        html += `<li>关注社区反馈，调整内容方向</li>`;
    }
    html += `</ul></div>`;

    // Recommended communities
    html += `<div class="phase-card">
        <div class="phase-name">${phase === 1 ? '⭐ 推荐评论社区' : '⭐ 推荐社区'}</div>
        <ul class="phase-tasks">`;
    recommended.slice(0, 6).forEach(c => {
        const official = c.category === 'reddit_verified' ? '<span class="badge-official">Reddit 官方</span>' : '';
        const reason = phase === 1
            ? `${c.zero_rate}% 无回复，平均 ${c.avg_comments} 评论/帖`
            : `${c.zero_rate}% 无回复，${c.avg_comments} 评论/帖，${c.posts_per_day} 帖/天`;
        html += `<li><a href="https://www.reddit.com/r/${c.name}/" target="_blank" class="sub-link">r/${c.name}</a>${official} — ${reason}</li>`;
    });
    html += `</ul></div>`;

    // Secondary communities
    if (secondary.length) {
        html += `<div class="phase-card">
            <div class="phase-name">${phase === 1 ? '✅ 也可以试试' : '⚠️ 谨慎尝试'}</div>
            <ul class="phase-tasks">`;
        secondary.forEach(c => {
            const note = c.zero_rate > 10 ? `${c.zero_rate}% 无回复率较高` : `日发帖量 ${c.posts_per_day}`;
            html += `<li><a href="https://www.reddit.com/r/${c.name}/" target="_blank" class="sub-link">r/${c.name}</a> — ${note}</li>`;
        });
        html += `</ul></div>`;
    }

    // Tips based on Reddit official guidance
    const tips = {
        1: 'Reddit 官方建议："不要以攒 karma 为目的，做一个好的贡献者，karma 自然会增长。" — 先评论积累，不要急着发帖。账号满 7 天后再考虑发帖。',
        2: '发帖前先在目标社区评论 10+ 次，了解社区喜欢什么内容。"How you say things is often more important than the point being made." — 避免被误认为 troll。',
        3: 'Reddit 的声誉系统（CQS）会综合评估你的邮箱验证、历史贡献、违规记录。保持高质量贡献，避免任何形式的 spam。',
    };
    html += `<div class="phase-tip">💡 ${tips[phase]}</div>`;
    html += `</div>`;

    output.innerHTML = html;
}

document.getElementById('btn-generate').addEventListener('click', () => {
    const karma = parseInt(document.getElementById('sync-karma').textContent) || 0;
    const ageText = document.getElementById('sync-age').textContent;
    const age = parseInt(ageText) || 0;
    generatePlan(karma, age);
});

// 检查插件状态
function checkPluginStatus() {
    // 尝试与 Chrome 扩展通信
    if (typeof chrome !== 'undefined' && chrome.runtime && chrome.runtime.sendMessage) {
        // 这里需要替换为实际的扩展 ID
        const EXTENSION_ID = 'your-extension-id-here';
        
        chrome.runtime.sendMessage(EXTENSION_ID, { action: 'getAccountData' }, (response) => {
            if (response && response.karma !== undefined) {
                // 插件已连接，显示数据
                document.getElementById('plugin-status').style.display = 'none';
                document.getElementById('account-data').style.display = 'grid';
                document.getElementById('sync-karma').textContent = response.karma;
                document.getElementById('sync-age').textContent = response.ageDays + ' 天';
                document.getElementById('btn-generate').disabled = false;
                document.getElementById('btn-generate').click();
            }
        });
    }
    
    // 也检查 localStorage 中是否有插件存储的数据
    const pluginData = localStorage.getItem('karmora_plugin_data');
    if (pluginData) {
        try {
            const data = JSON.parse(pluginData);
            if (data.karma !== undefined && data.ageDays !== undefined) {
                document.getElementById('plugin-status').style.display = 'none';
                document.getElementById('account-data').style.display = 'grid';
                document.getElementById('sync-karma').textContent = data.karma;
                document.getElementById('sync-age').textContent = data.ageDays + ' 天';
                document.getElementById('btn-generate').disabled = false;
                document.getElementById('btn-generate').click();
            }
        } catch (e) {
            console.error('Failed to parse plugin data:', e);
        }
    }
}

// 页面加载时检查插件状态
document.addEventListener('DOMContentLoaded', checkPluginStatus);

// 手动输入模式
function showManualInput() {
    document.getElementById('manual-input').style.display = 'block';
}
function submitManual() {
    const karma = parseInt(document.getElementById('manual-karma').value) || 0;
    const age = parseInt(document.getElementById('manual-age').value) || 1;
    document.getElementById('plugin-status').style.display = 'none';
    document.getElementById('manual-input').style.display = 'none';
    document.getElementById('account-data').style.display = 'grid';
    document.getElementById('sync-karma').textContent = karma;
    document.getElementById('sync-age').textContent = age + ' 天';
    document.getElementById('btn-generate').disabled = false;
    document.getElementById('btn-generate').click();
}

// 监听来自插件的消息
window.addEventListener('message', (event) => {
    if (event.data && event.data.type === 'KARMORA_PLUGIN_DATA') {
        const { karma, ageDays } = event.data;
        document.getElementById('plugin-status').style.display = 'none';
        document.getElementById('account-data').style.display = 'grid';
        document.getElementById('sync-karma').textContent = karma;
        document.getElementById('sync-age').textContent = ageDays + ' 天';
        document.getElementById('btn-generate').disabled = false;
        document.getElementById('btn-generate').click();
    }
});
</script>
